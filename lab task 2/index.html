 <!DOCTYPE html>
<html>
<head>
    <title>Login Form Validation</title>
    <script src="script.js" defer></script>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        .login-box{
            width:300px;
            margin:auto;
            padding:20px;
            border:1px solid #ccc;
            border-radius:10px;
        }

        input{
            width:90%;
            padding:8px;
            margin:8px;
        }

        button{
            padding:8px 20px;
            cursor:pointer;
        }

        #error{
            color:red;
        }

        #success{
            color:green;
        }
    </style>
</head>

<body>

<div class="login-box">

<h2>Login Form</h2>

<form id="loginForm">

Email <br>
<input type="text" id="email" placeholder="Enter email">

<br>

Password <br>
<input type="password" id="password" placeholder="Enter password">

<br>

<button type="submit">Login</button>

</form>

<p id="error"></p>
<p id="success"></p>
<p id="count"></p>

</div>

</body>
</html>
